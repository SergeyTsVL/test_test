<!DOCTYPE html>
<html>
<head>
    <title>Доступ ограничен</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card bg-secondary p-4" style="width: 350px;">
        <h3 class="text-center">Введите пароль</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Пароль разработчика" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger mt-3 p-2" style="font-size: 0.8rem;">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
