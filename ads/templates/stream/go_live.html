<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Go Live</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .layout { display: grid; grid-template-columns: 460px 1fr; gap: 16px; align-items: start; }
    .panel { border: 1px solid #ddd; padding: 12px; border-radius: 8px; }
    #chat { border:1px solid #ccc; padding:8px; height:220px; overflow:auto; background:#fafafa; }
    #users { margin: 0; padding-left: 18px; }
    .muted-note { color: #666; font-size: 12px; }
    video { width: 420px; background:#000; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Трансляция</h1>
  <p><b>ROOM:</b> {{ room }}</p>

  <div class="layout">
    <div class="panel">
      <h3>Камера стримера</h3>
      <div class="muted-note">
        Локальное видео всегда muted, чтобы не было эха. Зрители будут слышать звук.
      </div>
      <video id="local" autoplay playsinline muted></video>
      <div id="status" class="muted-note" style="margin-top:8px;"></div>
    </div>

    <div class="panel">
      <h3>Зрители онлайн</h3>
      <ul id="users"></ul>

      <h3 style="margin-top:16px;">Чат</h3>
      <div id="chat"></div>

      <form id="chatForm" style="margin-top:8px; display:flex; gap:8px;">
        <input id="chatInput" placeholder="Написать сообщение..." style="flex:1;" autocomplete="off" />
        <button type="submit">Отправить</button>
      </form>
    </div>
  </div>

  <script>
    // ---------------------------
    // 1) WebSocket connect
    // ---------------------------
    const room = "{{ room }}";
    const wsScheme = (location.protocol === "https:") ? "wss" : "ws";
    const ws = new WebSocket(`${wsScheme}://${location.host}/ws/stream/${room}/streamer/`);

    const statusEl = document.getElementById("status");
    const localVideo = document.getElementById("local");

    // ---------------------------
    // 2) Local media (video+audio)
    // ---------------------------
    let localStream = null;

    async function initLocalMedia() {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
      localVideo.srcObject = localStream;
      statusEl.textContent = "Камера/микрофон: OK";
    }

    // ---------------------------
    // 3) Multi-viewers WebRTC:
    //    pc per viewer_id
    // ---------------------------
    const pcs = new Map(); // viewer_id -> RTCPeerConnection

    function createPC(viewerId) {
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });

      // добавляем все треки (видео+аудио)
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          ws.send(JSON.stringify({
            type: "ice",
            viewer_id: viewerId,
            data: e.candidate
          }));
        }
      };

      return pc;
    }

    async function sendOffer(viewerId) {
      const pc = pcs.get(viewerId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      ws.send(JSON.stringify({
        type: "offer",
        viewer_id: viewerId,
        data: pc.localDescription
      }));
    }

    // ---------------------------
    // 4) UI: presence + chat
    // ---------------------------
    function renderUsers(users) {
      const ul = document.getElementById("users");
      ul.innerHTML = "";
      users.forEach(u => {
        const li = document.createElement("li");
        li.textContent = u;
        ul.appendChild(li);
      });
    }

    function addChatLine(from, text) {
      const box = document.getElementById("chat");
      const line = document.createElement("div");
      line.textContent = `${from}: ${text}`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById("chatForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;

      ws.send(JSON.stringify({ type: "chat", text }));
      input.value = "";
    });

    // ---------------------------
    // 5) WebSocket events
    // ---------------------------
    ws.onopen = () => {
      statusEl.textContent = (statusEl.textContent ? statusEl.textContent + " | " : "") + "WS: подключен";
    };

    ws.onclose = () => {
      statusEl.textContent = "WS: отключен";
    };

    ws.onmessage = async (evt) => {
      const msg = JSON.parse(evt.data);

      // ---- presence
      if (msg.type === "presence") {
        renderUsers(msg.users);
        return;
      }

      // ---- chat
      if (msg.type === "chat") {
        addChatLine(msg.from, msg.text);
        return;
      }

      // ---- WebRTC signaling for multi viewers
      if (msg.type === "viewer_joined") {
        const viewerId = msg.viewer_id;

        // создаём отдельный pc под зрителя
        const pc = createPC(viewerId);
        pcs.set(viewerId, pc);

        await sendOffer(viewerId);
        return;
      }

      if (msg.type === "answer") {
        const pc = pcs.get(msg.viewer_id);
        if (pc) await pc.setRemoteDescription(msg.data);
        return;
      }

      if (msg.type === "ice") {
        const pc = pcs.get(msg.viewer_id);
        if (pc) {
          try { await pc.addIceCandidate(msg.data); } catch (e) {}
        }
        return;
      }

      if (msg.type === "viewer_left") {
        const pc = pcs.get(msg.viewer_id);
        if (pc) {
          pc.close();
          pcs.delete(msg.viewer_id);
        }
        return;
      }
    };

    // ---------------------------
    // 6) Start
    // ---------------------------
    (async () => {
      try {
        await initLocalMedia();
      } catch (e) {
        statusEl.textContent = "Нет доступа к камере/микрофону. Разрешите в браузере.";
        console.error(e);
      }
    })();
  </script>
</body>
</html>
