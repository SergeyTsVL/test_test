<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой проект Django {% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar {
            overflow: hidden;
            background-color: #333;
            padding: 14px 16px;
        }
        .navbar a {
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-size: 17px;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
    </style>
</head>

<script>
    setTimeout(function () {
        window.location.href = "{% url 'ads:dev_password_page' %}?next=" + encodeURIComponent(window.location.pathname + window.location.search);
    }, 20000);
</script>

<body>
    <div class="navbar">
        <a href="{% url 'home' %}">Домашняя</a>
        <a href="{% url 'ads:add_ad' %}">Добавить объявления</a>
        <a href="{% url 'ads:ad_list' %}">Все объявления</a>
        <a href="{% url 'ads:search' %}">Найти объявление</a>
<!--        <a href="{% url 'ads:create_proposal' %}">Опубликовать предложение</a>-->
<!--        <a href="{% url 'ads:add_proposal' %}">Полученные предложение</a>-->

        {% if user.is_authenticated %}
            <a href="{% url 'ads:go_live' %}">Запустить мой стрим</a>
            <a href="{% url 'logout' %}">Выход из системы</a>
        {% else %}
            <a href="{% url 'login' %}">Логин</a>
            <a href="{% url 'ads:signup_viewer' %}">Регистрация зрителя</a>
            <a href="{% url 'ads:signup_streamer' %}">Регистрация стримера</a>
        {% endif %}
    </div>

    {% block content %}
    {% endblock %}

</body>
</html>
